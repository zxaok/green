plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zxaeva.greenifyhibernate'
    compileSdk 34

    defaultConfig {
        applicationId 'com.zxaeva.greenifyhibernate'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
